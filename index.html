<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hugo — Machine Learning × Comunicación</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: oklch(0.16 0.012 72);
    --bg-2: oklch(0.205 0.014 70);
    --ink: oklch(0.955 0.006 84);
    --ink-dim: oklch(0.74 0.01 80);
    --ink-faint: oklch(0.52 0.012 78);
    --ml: #3D7BFF;
    --comm: #E2A24A;
    --m: 1;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ height: 100%; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Space Grotesk", system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root{ height: 100%; }

  .world{
    position: relative;
    height: 100vh; width: 100vw;
    overflow: hidden;
    isolation: isolate;
  }

  /* ---------- ambient color fields ---------- */
  .field{ position: absolute; inset: 0; pointer-events: none; transition: opacity .9s ease; will-change: opacity; }
  .field.base{
    opacity: 1;
    background:
      radial-gradient(60% 70% at 50% 40%, oklch(0.235 0.015 70), transparent 70%),
      radial-gradient(140% 120% at 50% 124%, oklch(0.115 0.012 70), transparent 72%);
  }
  .field.ml{
    opacity: 0;
    background:
      radial-gradient(85% 120% at 6% 50%, color-mix(in oklab, var(--ml) 34%, transparent), transparent 60%),
      radial-gradient(60% 90% at 14% 64%, color-mix(in oklab, var(--ml) 16%, transparent), transparent 72%);
    -webkit-mask-image: linear-gradient(to right, var(--ml) 30%, transparent 80%);
            mask-image: linear-gradient(to right, var(--ml) 30%, transparent 80%);
  }
  .field.comm{
    opacity: 0;
    background:
      radial-gradient(85% 120% at 94% 48%, color-mix(in oklab, var(--comm) 36%, transparent), transparent 60%),
      radial-gradient(70% 80% at 86% 74%, color-mix(in oklab, var(--comm) 18%, transparent), transparent 74%);
    -webkit-mask-image: linear-gradient(to left, var(--comm) 30%, transparent 80%);
            mask-image: linear-gradient(to left, var(--comm) 30%, transparent 80%);
  }
  .field.grid{
    opacity: 0;
    background-image:
      linear-gradient(color-mix(in oklab, var(--ml) 13%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklab, var(--ml) 13%, transparent) 1px, transparent 1px);
    background-size: 48px 48px, 48px 48px;
    -webkit-mask-image: radial-gradient(72% 90% at 12% 50%, #000 0%, transparent 64%);
            mask-image: radial-gradient(72% 90% at 12% 50%, #000 0%, transparent 64%);
  }
  .field.spot{
    opacity: 0;
    background: radial-gradient(40% 90% at 88% 26%, color-mix(in oklab, var(--comm) 42%, transparent), transparent 62%);
    -webkit-mask-image: radial-gradient(72% 110% at 88% 40%, #000 0%, transparent 72%);
            mask-image: radial-gradient(72% 110% at 88% 40%, #000 0%, transparent 72%);
    mix-blend-mode: screen;
  }
  .world[data-side="ml"]   .field.ml,
  .world[data-side="ml"]   .field.grid{ opacity: 1; }
  .world[data-side="comm"] .field.comm,
  .world[data-side="comm"] .field.spot{ opacity: 1; }
  .world[data-side="ml"]   .field.base,
  .world[data-side="comm"] .field.base{ opacity: .5; }
  /* faint identity tint on each side while idle, so the two zones read clearly */
  .world[data-side="center"] .field.ml{ opacity: .2; }
  .world[data-side="center"] .field.comm{ opacity: .2; }

  /* ---------- figures ---------- */
  .figures{ position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .fig{
    position: absolute;
    background-repeat: no-repeat;
    will-change: transform, opacity, width;
    transition: opacity .9s ease, transform 1s cubic-bezier(.19,.76,.22,1),
                width 1s cubic-bezier(.19,.76,.22,1), filter .9s ease;
  }

  /* centre — Hugo cut-out */
  .fig.center{
    left: 50%; bottom: -2vh;
    width: 100vh; height: 132vh;
    transform: translateX(-50%);
    background-image: url('assets/portrait-final.png');
    background-size: contain;
    background-position: center bottom;
    filter: drop-shadow(0 26px 50px rgba(0,0,0,.55));
    opacity: 1;
  }
  .world[data-side="ml"]   .fig.center,
  .world[data-side="comm"] .fig.center{ opacity: 0; transform: translateX(-50%) scale(1.05); filter: blur(9px); }

  /* ML photo — lives on the LEFT */
  .fig.ml{
    left: 0; top: 0; height: 100%;
    width: 19vw;
    background-image: url('assets/ml-soft.png');
    background-size: cover; background-position: 60% 36%;
    opacity: .62;
    filter: grayscale(.16) brightness(.94) saturate(.95);
    -webkit-mask-image: linear-gradient(to right, #000 54%, transparent 100%);
            mask-image: linear-gradient(to right, #000 54%, transparent 100%);
  }
  .world[data-side="ml"]   .fig.ml{ width: 50vw; opacity: 1; filter: saturate(1) brightness(1.02); }
  .world[data-side="comm"] .fig.ml{ width: 11vw; opacity: 0; }

  /* Communication photo — lives on the RIGHT */
  .fig.comm{
    right: 0; top: 0; height: 100%;
    width: 19vw;
    background-image: url('assets/comm-soft.png');
    background-size: cover; background-position: 42% 32%;
    opacity: .62;
    filter: brightness(.96) saturate(.98);
    -webkit-mask-image: linear-gradient(to left, #000 54%, transparent 100%);
            mask-image: linear-gradient(to left, #000 54%, transparent 100%);
  }
  .world[data-side="comm"] .fig.comm{ width: 50vw; opacity: 1; filter: saturate(1.02) brightness(.94); }
  .world[data-side="ml"]   .fig.comm{ width: 11vw; opacity: 0; }

  /* colour wash over the active side photo to keep its world identity */
  .fig.ml::after, .fig.comm::after{
    content: ""; position: absolute; inset: 0; opacity: 0; transition: opacity .9s ease;
  }
  .fig.ml::after{ background: linear-gradient(120deg, color-mix(in oklab, var(--ml) 42%, transparent), transparent 64%); }
  .fig.comm::after{ background: linear-gradient(240deg, color-mix(in oklab, var(--comm) 42%, transparent), transparent 64%); }
  .world[data-side="ml"] .fig.ml::after,
  .world[data-side="comm"] .fig.comm::after{ opacity: 1; }

  /* ---------- greeting ---------- */
  .greeting{
    position: absolute; left: 0; right: 0; top: 60%;
    z-index: 4; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    pointer-events: none;
    transition: opacity .5s ease, transform .7s cubic-bezier(.19,.76,.22,1);
  }
  .greeting::before{
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 820px; height: 320px; transform: translate(-50%,-50%);
    background: radial-gradient(closest-side, oklch(0.12 0.01 70 / .68), transparent 72%);
    z-index: -1;
  }
  .greeting h1{
    font-size: clamp(32px, 4.6vw, 66px);
    font-weight: 500; letter-spacing: -0.03em; line-height: 1; white-space: nowrap;
    text-shadow: 0 4px 30px oklch(0 0 0 / .55);
  }
  .greeting h1 b{ font-weight: 700; }
  .greeting p{
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(10px, 1vw, 12.5px); letter-spacing: .3em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .world[data-side="ml"]   .greeting,
  .world[data-side="comm"] .greeting{ opacity: 0; transform: translateY(12px); }

  /* ---------- side panels ---------- */
  .panel{
    position: absolute; top: 0; bottom: 0;
    width: min(500px, 42vw);
    display: flex; flex-direction: column; justify-content: center; gap: 22px;
    opacity: 0; pointer-events: none; z-index: 5;
    transition: opacity .7s ease, transform .85s cubic-bezier(.19,.76,.22,1), filter .7s ease;
    filter: blur(6px);
  }
  .panel.ml{ right: clamp(36px, 6vw, 120px); align-items: flex-start; text-align: left; transform: translateX(40px); }
  .panel.comm{
    left: clamp(36px, 6vw, 120px); align-items: flex-end; text-align: right; transform: translateX(-40px);
    font-family: "Spectral", Georgia, serif;
  }
  .world[data-side="ml"]   .panel.ml{ opacity: 1; transform: none; filter: none; pointer-events: auto; }
  .world[data-side="comm"] .panel.comm{ opacity: 1; transform: none; filter: none; pointer-events: auto; }

  .kicker{
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--ml);
    display: flex; align-items: center; gap: 12px;
  }
  .panel.comm .kicker{ color: var(--comm); font-family: "JetBrains Mono", monospace; justify-content: flex-end; }
  .kicker .ln{ width: 38px; height: 1px; background: currentColor; opacity: .6; }

  .panel h2{
    font-size: clamp(30px, 3.7vw, 54px);
    font-weight: 600; line-height: 1.02; letter-spacing: -0.025em; text-wrap: balance;
  }
  .panel.comm h2{ font-weight: 500; letter-spacing: -0.01em; line-height: 1.06; }
  .panel.comm h2 em{ font-style: italic; color: var(--comm); }
  .panel.ml h2 em{ font-style: normal; color: var(--ml); }

  .panel p.lede{
    font-size: clamp(15px, 1.15vw, 18px); line-height: 1.6; color: var(--ink-dim); max-width: 42ch;
  }
  .panel.comm p.lede{ font-size: clamp(16px, 1.25vw, 20px); font-weight: 300; line-height: 1.62; }

  .chips{ display: flex; flex-wrap: wrap; gap: 8px; }
  .panel.comm .chips{ justify-content: flex-end; }
  .chip{
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid oklch(1 0 0 / .16); color: var(--ink-dim);
  }
  .panel.ml .chip{ border-color: color-mix(in oklab, var(--ml) 40%, transparent); }
  .panel.comm .chip{ border-color: color-mix(in oklab, var(--comm) 46%, transparent); font-family: "Spectral", serif; letter-spacing: .04em; text-transform: none; font-size: 13px; font-style: italic; }

  .cta{
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 12px;
    font-family: "Space Grotesk", sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: .01em;
    color: var(--bg); background: var(--ml);
    padding: 14px 22px; border-radius: 999px; text-decoration: none;
    transition: transform .25s ease, box-shadow .25s ease, gap .25s ease;
    box-shadow: 0 14px 34px -14px color-mix(in oklab, var(--ml) 80%, transparent);
  }
  .panel.comm .cta{ align-self: flex-end; background: var(--comm); box-shadow: 0 14px 34px -14px color-mix(in oklab, var(--comm) 80%, transparent); font-family: "Spectral", serif; font-style: italic; font-size: 16px; }
  .cta:hover{ transform: translateY(-2px); gap: 18px; }
  .cta .arrow{ transition: transform .25s ease; }
  .cta:hover .arrow{ transform: translateX(4px); }

  .creds{
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: .08em; color: var(--ink-faint); line-height: 1.7;
  }
  .panel.comm .creds{ font-family: "Spectral", serif; font-style: italic; letter-spacing: .01em; font-size: 13px; }

  /* ---------- chrome ---------- */
  .brand{
    position: absolute; top: 30px; left: 34px; z-index: 8;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; letter-spacing: .42em; text-transform: uppercase;
    color: var(--ink); opacity: .9;
    display: flex; align-items: center; gap: 12px; transition: opacity .5s ease;
  }
  .world[data-side="ml"] .brand,
  .world[data-side="comm"] .brand{ opacity: 0; pointer-events: none; }
  .brand .dot{ width: 7px; height: 7px; border-radius: 50%; background: var(--ink); transition: background .6s ease; }
  .world[data-side="ml"]   .brand .dot{ background: var(--ml); }
  .world[data-side="comm"] .brand .dot{ background: var(--comm); }

  .hints{
    position: absolute; left: 0; right: 0; bottom: 30px; z-index: 7;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 clamp(28px, 5vw, 80px); pointer-events: none; transition: opacity .5s ease;
  }
  .hint{
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: var(--ink);
    display: flex; align-items: center; gap: 12px;
    background: oklch(0.2 0.012 72 / .55); backdrop-filter: blur(8px);
    border: 1px solid oklch(1 0 0 / .18); border-radius: 999px;
    padding: 11px 18px; cursor: pointer; pointer-events: auto;
    transition: color .3s ease, border-color .3s ease, background .3s ease, transform .3s ease;
  }
  .hint .hnum{ color: var(--ink-faint); }
  .hint .k{ font-size: 18px; line-height: 1; transition: transform .3s ease; }
  .hint.l .k{ color: var(--ml); }
  .hint.r .k{ color: var(--comm); }
  .hint.l:hover{ color: #fff; border-color: color-mix(in oklab, var(--ml) 62%, transparent); background: color-mix(in oklab, var(--ml) 14%, oklch(0.2 0.012 72 / .6)); transform: translateY(-2px); }
  .hint.r:hover{ color: #fff; border-color: color-mix(in oklab, var(--comm) 62%, transparent); background: color-mix(in oklab, var(--comm) 14%, oklch(0.2 0.012 72 / .6)); transform: translateY(-2px); }
  .hint.l:hover .k{ transform: translateX(-4px); }
  .hint.r:hover .k{ transform: translateX(4px); }
  .world[data-side="ml"]   .hints,
  .world[data-side="comm"] .hints{ opacity: 0; }
  .world[data-side="ml"]   .hint,
  .world[data-side="comm"] .hint{ pointer-events: none; }

  .scrollnote{
    position: absolute; left: 50%; bottom: 34px; transform: translateX(-50%); z-index: 7;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing: .26em; text-transform: uppercase; color: var(--ink-faint);
    transition: opacity .5s ease;
  }
  .world[data-side="ml"]   .scrollnote,
  .world[data-side="comm"] .scrollnote{ opacity: 0; }

  .back{
    position: absolute; top: 26px; z-index: 9;
    display: inline-flex; align-items: center; gap: 9px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-dim);
    background: oklch(0.16 0.012 72 / .55); backdrop-filter: blur(6px); border: 1px solid oklch(1 0 0 / .14);
    padding: 9px 15px; border-radius: 999px; cursor: pointer;
    opacity: 0; transform: translateY(-8px); pointer-events: none;
    transition: opacity .4s ease, transform .4s ease, border-color .3s ease, color .3s ease;
  }
  .back:hover{ color: var(--ink); border-color: oklch(1 0 0 / .3); }
  .world[data-side="ml"]   .back{ left: 30px; right: auto; opacity: 1; transform: none; pointer-events: auto; }
  .world[data-side="comm"] .back{ right: 30px; left: auto; opacity: 1; transform: none; pointer-events: auto; }

  @media (max-width: 760px){
    .panel{ width: 80vw; }
    .fig.center{ width: 96vw; height: 80vh; }
    .greeting{ top: 60%; }
  }
  @media (prefers-reduced-motion: reduce){
    .fig, .panel, .field, .greeting{ transition-duration: .01ms; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "greeting": "¡Hola, soy Hugo!",
      "trigger": "hover",
      "motion": 100,
      "mlAccent": "#3D7BFF",
      "commAccent": "#E2A24A"
    }/*EDITMODE-END*/;

    function App(){
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const m = Math.max(0, Math.min(1, (t.motion ?? 100) / 100));

      const [side, setSide] = useState('center');
      const [locked, setLocked] = useState(false);
      const [tilt, setTilt] = useState({ x: 0, y: 0 });

      const worldRef = useRef(null);
      const sideRef = useRef('center');
      const lockedRef = useRef(false);
      const armedRef = useRef(true); // must pass through the centre band before a side can re-open
      sideRef.current = side; lockedRef.current = locked;

      const commit = useCallback((s) => { setSide(s); setLocked(true); setTilt({x:0,y:0}); }, []);
      const reset  = useCallback(() => { setSide('center'); setLocked(false); armedRef.current = false; }, []);

      const onMove = useCallback((e) => {
        const el = worldRef.current; if (!el) return;
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;
        const y = (e.clientY - r.top) / r.height;
        const onChrome = !!(e.target.closest && e.target.closest('.panel, .back, .hint'));

        // Hover OPENS a side and holds it, so the whole panel (incl. the CTA)
        // stays put and is freely clickable. Sweep to the far opposite edge to
        // switch; use Back / Esc / centre to return.
        if (t.trigger === 'hover' && !onChrome){
          const cur = sideRef.current;
          if (cur === 'center'){
            // re-arm once the cursor returns to the neutral centre band, so coming
            // back from a side doesn't instantly re-open the one you're parked on
            if (x > 0.40 && x < 0.60) armedRef.current = true;
            if (armedRef.current){
              if (x < 0.30) commit('ml');
              else if (x > 0.70) commit('comm');
            }
          } else if (cur === 'ml' && x > 0.86){
            commit('comm');
          } else if (cur === 'comm' && x < 0.14){
            commit('ml');
          }
        }
        if (sideRef.current === 'center'){
          setTilt({ x: (x - 0.5) * 26 * m, y: (0.5 - y) * 16 * m });
        }
      }, [t.trigger, m, commit]);

      const onLeave = useCallback(() => {
        if (!lockedRef.current) setTilt({ x: 0, y: 0 });
      }, []);

      const onClick = useCallback((e) => {
        if (e.target.closest && e.target.closest('.panel, .back, .hint, .cta')) return;
        const el = worldRef.current; if (!el) return;
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;
        if (x < 0.34) commit('ml');
        else if (x > 0.66) commit('comm');
        else reset();
      }, [commit, reset]);

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === 'ArrowLeft') commit('ml');
          else if (e.key === 'ArrowRight') commit('comm');
          else if (e.key === 'Escape' || e.key === 'ArrowDown') reset();
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [commit, reset]);

      const centerFigStyle = side === 'center'
        ? { transform: `translateX(-50%) translate(${tilt.x.toFixed(1)}px, ${(-tilt.y).toFixed(1)}px)` }
        : undefined;

      const rootStyle = { '--ml': t.mlAccent, '--comm': t.commAccent, '--m': m };

      return (
        <div
          className="world"
          ref={worldRef}
          data-side={side}
          style={rootStyle}
          onPointerMove={onMove}
          onPointerLeave={onLeave}
          onClick={onClick}
        >
          <div className="field base"></div>
          <div className="field ml"></div>
          <div className="field comm"></div>
          <div className="field grid"></div>
          <div className="field spot"></div>

          <div className="figures">
            <div className="fig ml"></div>
            <div className="fig comm"></div>
            <div className="fig center" style={centerFigStyle}></div>
          </div>

          <div className="brand"><span className="dot"></span> HUGO</div>

          <button className="back" onClick={(e)=>{ e.stopPropagation(); reset(); }}>
            <span>✕</span> Volver al centro
          </button>

          {/* ML — panel de texto a la derecha, la foto crece a la izquierda */}
          <div className="panel ml">
            <div className="kicker"><span className="ln"></span>01 · Ingeniero de Machine Learning</div>
            <h2>Enseño a las máquinas a <em>actuar</em> en el mundo real.</h2>
            <p className="lede">
              Desde un controlador de levitación por aprendizaje por refuerzo profundo (deep-RL) para un vehículo hyperloop
              hasta la investigación en aprendizaje por imitación en la USC, convierto el aprendizaje por refuerzo
              de vanguardia en sistemas que funcionan fuera del papel, y los dirijo a problemas que realmente importan.
            </p>
            <div className="chips">
              <span className="chip">Deep RL</span>
              <span className="chip">Robótica</span>
              <span className="chip">Aprendizaje por Imitación</span>
              <span className="chip">Visión por Computador</span>
            </div>
            <a className="cta" href="#ml" onClick={(e)=>e.stopPropagation()}>
              Explora la ingeniería <span className="arrow">→</span>
            </a>
            <div className="creds">Becario Fulbright · Máster en Inteligencia Artificial, USC · Grado en Ciencia de Datos, UPV</div>
          </div>

          {/* Comunicación — panel de texto a la izquierda, la foto crece a la derecha */}
          <div className="panel comm">
            <div className="kicker">Comunicador y Orador · 02<span className="ln"></span></div>
            <h2>Ayudo a las <em>personas</em> a ser <em>escuchadas de verdad</em>.</h2>
            <p className="lede">
              Mi objetivo es ayudarte a que tus ideas lleguen al mundo de manera clara y contundente. Tengo experiencia en discursos nacionales e internacionales, desde dirección de un equipo de más de cincuenta personas hasta escenarios con más de trescientas personas. 
              Busco hacer evidente la importancia de comunicar de una forma eficaz y la falta de formación general en oratoria.
              Busco enseñarte a ti, seas ingeniero, científico, artista o empresario, cómo comunicar para inspirar, influir y ser escuchado para transformar tu vida personal y profesional.
            </p>
            <div className="chips">
              <span className="chip">Oratoria</span>
              <span className="chip">Liderazgo</span>
              <span className="chip">Storytelling</span>
              <span className="chip">Improvisación</span>
            </div>
            <a className="cta" href="#comm" onClick={(e)=>e.stopPropagation()}>
              Adéntrate en la historia <span className="arrow">→</span>
            </a>
            <div className="creds">Líder del equipo Hyperloop UPV · mentorizado por Tomás Baviera · formado con Vinh Giang y Paco Grau</div>
          </div>

          <div className="greeting">
            <h1 dangerouslySetInnerHTML={{ __html: t.greeting.replace(/Hugo/g, '<b>Hugo</b>') }} />
            <p>Ingeniero de machine learning × comunicador</p>
          </div>

          <div className="hints">
            <button className="hint l" onClick={(e)=>{ e.stopPropagation(); commit('ml'); }}>
              <span className="k">←</span>
              <span><span className="hnum">01</span> Machine Learning</span>
            </button>
            <button className="hint r" onClick={(e)=>{ e.stopPropagation(); commit('comm'); }}>
              <span>Comunicación <span className="hnum">02</span></span>
              <span className="k">→</span>
            </button>
          </div>
          <div className="scrollnote">{t.trigger === 'hover' ? 'Pasa el cursor o pulsa un lado para abrir · Esc para volver' : 'Haz clic en un lado para abrir · Esc para volver'}</div>

          <TweaksPanel title="Ajustes">
            <TweakSection label="Identidad" />
            <TweakText label="Saludo" value={t.greeting} onChange={(v)=>setTweak('greeting', v)} />
            <TweakSection label="Interacción" />
            <TweakRadio label="Activador" value={t.trigger} options={[{value:'hover',label:'cursor'},{value:'click',label:'clic'}]} onChange={(v)=>setTweak('trigger', v)} />
            <TweakSlider label="Paralaje" value={t.motion} min={0} max={100} step={5} unit="%" onChange={(v)=>setTweak('motion', v)} />
            <TweakSection label="Acentos" />
            <TweakColor label="Lado ML" value={t.mlAccent} options={['#3D7BFF','#2BD4D4','#6E7BFF','#34C56B']} onChange={(v)=>setTweak('mlAccent', v)} />
            <TweakColor label="Lado Comm" value={t.commAccent} options={['#E2A24A','#E8765A','#E06A86','#D98AE0']} onChange={(v)=>setTweak('commAccent', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
